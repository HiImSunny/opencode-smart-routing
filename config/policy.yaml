routing:
  default_route: cloud_fast

  thresholds:
    local_fast_max_chars: 10000
    local_fast_max_messages: 10
    cloud_architecture_min_chars: 20000

  keyword_rules:
    cloud_vision:
      - image
      - screenshot
      - figma
      - ui mockup
      - photo
    cloud_debug:
      - debug
      - stacktrace
      - traceback
      - logs
      - security
      - vulnerability
      - review
    cloud_architecture:
      - architecture
      - refactor
      - multi-file
      - migration
      - system design
      - plan
      - redesign
    local_fast:
      - rename
      - fix typo
      - docstring
      - write test
      - small fix

fallback_chains:
  local_fast:
    - provider: ollama
      model: qwen2.5-coder:7b
    - provider: opencode_go   # fallback nếu ollama down
      model: your-cloud-model

  cloud_fast:
    - provider: opencode_go
      model: your-cloud-model
    - provider: ollama        # fallback nếu cloud fail
      model: qwen2.5-coder:7b

  cloud_debug:
    - provider: opencode_go
      model: your-cloud-model
    - provider: ollama
      model: qwen2.5-coder:7b

  cloud_architecture:
    - provider: opencode_go
      model: your-cloud-model
    - provider: ollama
      model: qwen2.5-coder:7b

  cloud_vision:
    - provider: opencode_go
      model: your-cloud-vision-model
    - provider: ollama
      model: qwen2.5-coder:7b

timeouts:
  ollama_seconds: 60
  cloud_seconds: 30
  fallback_extra_seconds: 10

retry:
  max_retries_per_provider: 2
  retry_on_status: [429, 500, 502, 503, 504]

cooldown:
  enabled: true
  window_seconds: 60
  failure_threshold: 3
